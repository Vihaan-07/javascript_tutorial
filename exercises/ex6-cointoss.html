<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let toss = Math.ceil(Math.random() * 2);
        let result = toss == 1 ? "heads" : "tails";
        let guess = prompt("heads or tails?");
        document.write(result == guess? "you won" : "You lose");
    </script>
</body>
</html>
