<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 7</title>
</head>
<body>
    <script>
        function greet(greeting = "Hello", name = ""){
            console.log(greeting + " " + name);
        }

        function convertToFarenheit(celsius){
            return (celsius *9/5) + 32
        }

        function convertToCelsius(farenheit){
            return (farenheit-32)*5/9;
        }

        function convertLength(length, from, to){
            if(from == "km"){
                if(to == "miles"){
                    return length/1.6;
                } else if(to == "ft"){
                    return length * 3281;
                }
            }

            else if(from == "miles"){
                if(to == "km"){
                    return length * 1.6;
                } else if(to == "ft"){
                    return length * 5280;
                }
            }

            else{
                if(to == "km"){
                    return length / 3281;
                } else{
                    return length / 5280;
                }
            }
        }

        greet("Hello", "Vihaan");
        greet("bonjour", "Pierre");

        console.log(convertToFarenheit(25));
        console.log(convertToCelsius(77));
        console.log(convertToCelsius(86));
    </script>
</body>
