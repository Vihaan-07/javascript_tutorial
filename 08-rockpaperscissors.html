<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booleans</title>
</head>

<body>
    <h1>Rock Paper Scissors</h1>
    <button onclick="play(1);">Rock</button>
    <button onclick="play(2);">Paper</button>
    <button onclick="play(3);">Scissors</button>
    <button onclick="score.win = 0; 
                    score.loss = 0;
                    score.tie = 0;
                    localStorage.removeItem('score');">
                Reset Score</button>

    <script>
        const score = JSON.parse(localStorage.getItem("score")) || {win:0, loss:0, tie:0};

        function play(player_input) {
            comp_input = Math.floor(Math.round(Math.random() * 3));
            let choices = ["rock", "paper", "scissors"];
            player_input = choices[player_input - 1];
            comp_input = choices[comp_input - 1];

            switch (player_input) {
                case "rock":
                    if (comp_input == "paper") {
                        score.loss++;
                        xalert(`You chose rock and the computer chose paper. You lose!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);

                    } else if (comp_input == "scissors") {
                        score.win++;
                        alert(`You chose rock and the computer chose scissors. You win!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    } else {
                        score.tie++;
                        alert(`You both picked rock. Tie!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    }
                    break;

                case "paper":
                    if (comp_input == "scissors") {
                        score.loss++;
                        alert(`You chose paper and the computer chose scissors. You lose!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    } else if (comp_input == "rock") {
                        score.win++;
                        alert(`You chose paper and the computer chose rock. You win!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    } else {
                        score.tie++;
                        alert(`You both picked paper. Tie!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    }
                    break;

                case "scissors":
                    if (comp_input == "rock") {
                        score.loss++;
                        alert(`You chose scissors and the computer chose rock. You lose!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    } else if (comp_input == "paper") {
                        score.win++;
                        alert(`You chose scissors and the computer chose paper. You win!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    } else {
                        score.tie++;
                        alert(`You both picked scissors. Tie!\n
                        Wins: ${score.win} Loss: ${score.loss} Tie: ${score.tie}`);
                    }
                    break;
            }

            localStorage.setItem("score", JSON.stringify(score));
        }

    </script>
</body>

</html>
