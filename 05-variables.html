<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <script>
        let v1 = 3;
        console.log(v1);

        let v2 = 2+2;
        console.log(v2);

        console.log(v2 + v1);

        let message = "Hello World";
        console.log(message);

        v1 = "Hola";
        console.log(v1);
    </script>
</body>
</html>
